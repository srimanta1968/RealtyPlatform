name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-flight runs for the same ref so a second push to a PR
# doesn't keep stale jobs spinning.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build · Test · Typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 25

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: kiana_realty_growth_platform_db
        ports: ['5432:5432']
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports: ['6379:6379']
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/kiana_realty_growth_platform_db
      EVENT_BUS_REDIS_URL: redis://localhost:6379
      JWT_SECRET: ci-only-secret-for-test-runs-not-production
      NODE_ENV: test

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint (affected)
        run: pnpm turbo run lint --filter=...[origin/main]

      - name: Typecheck (affected)
        run: pnpm turbo run typecheck --filter=...[origin/main]

      - name: Build (affected)
        run: pnpm turbo run build --filter=...[origin/main]

      - name: Test (affected)
        run: pnpm turbo run test --filter=...[origin/main]

  docker-build:
    name: Docker · Build images
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: build
    # Only push images on main; PR builds verify Dockerfiles still build.
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        service:
          - user-service
          - lead-service
          - property-service
          - crm-service
          - notification-service
          - media-service

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        if: github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push ${{ matrix.service }}
        uses: docker/build-push-action@v5
        with:
          context: .
          file: infra/docker/${{ matrix.service }}.Dockerfile
          push: ${{ github.ref == 'refs/heads/main' }}
          tags: |
            ghcr.io/${{ github.repository }}/${{ matrix.service }}:${{ github.sha }}
            ${{ github.ref == 'refs/heads/main' && format('ghcr.io/{0}/{1}:latest', github.repository, matrix.service) || '' }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,scope=${{ matrix.service }},mode=max

  deploy:
    name: Deploy · main only
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: docker-build
    if: github.ref == 'refs/heads/main'
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ArgoCD pulls images automatically once they land in GHCR with the
      # main-branch SHA tag (see infra/argocd/applications/). This step is
      # a sync nudge — replace with the production deploy mechanism your
      # ops team standardises on (helm, argocd-cli, kubectl).
      - name: Notify deploy mechanism
        env:
          DEPLOY_WEBHOOK_URL: ${{ secrets.DEPLOY_WEBHOOK_URL }}
        run: |
          if [ -z "$DEPLOY_WEBHOOK_URL" ]; then
            echo "::warning::DEPLOY_WEBHOOK_URL secret not configured — skipping deploy nudge."
            exit 0
          fi
          curl -sSf -X POST -H 'Content-Type: application/json' \
            --data "{\"sha\":\"${GITHUB_SHA}\",\"ref\":\"${GITHUB_REF}\"}" \
            "$DEPLOY_WEBHOOK_URL"
